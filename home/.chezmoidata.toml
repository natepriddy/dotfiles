# Committed, public, FAIL-CLOSED defaults for every machine.
#
# Real per-machine values are written to ~/.config/chezmoi/chezmoi.toml by
# .chezmoi.toml.tmpl at `chezmoi init`, and OVERRIDE everything here.
# A machine that never ran init therefore gets the safest possible profile.
#
# NEVER put a secret in this file — it is public.

trust_level  = "client-restricted"   # safest default; init raises it per machine
machine_name = ""

[features]
secrets       = false
ssh_keys      = false
homebrew      = false   # minimal base; init turns this on for every chosen tier
homebrew_full = false   # standard/heavy tail; init turns this on for non-client tiers
work_git      = false

[git]
personal_name  = "Nate Priddy"
personal_email = ""   # set per-machine via init / local config
work_email     = ""   # set on company / client machines
signing_key    = ""

[claude]
# Machine-local overrides only — set real values in ~/.config/chezmoi/chezmoi.toml.
# Empty here = fail-closed: no secret emitted, official plugins only.
context7_api_key = ""   # empty -> CONTEXT7_API_KEY is omitted from settings.json (ctx7 runs unauthenticated)
plugins_dir      = ""   # empty -> the nate-claude marketplace + council plugin are omitted; abs path enables them

[obsidian]
# Experimental, opt-in Obsidian/Claude-memory bundle. NOT tied to trust level.
# Fail-closed: default disabled everywhere; init (or a machine-local override)
# enables it per-machine. Real vault path lives only in machine-local config.
enabled = false   # gates the obsidian-* skills, the CLAUDE.md memory section, and the OBSIDIAN_VAULT export
vault   = ""      # absolute vault path; empty -> OBSIDIAN_VAULT stays unset and the bundle is inert
